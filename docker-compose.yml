services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - wordpress1
      - wordpress2
    networks:
      - public

  wordpress1:
    image: wordpress:php8.2-apache
    depends_on:
      - db1
    environment:
      WORDPRESS_DB_HOST: db1:3306
      WORDPRESS_DB_USER: wp1
      WORDPRESS_DB_PASSWORD: wp1pass
      WORDPRESS_DB_NAME: wp1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost/site1');
        define('WP_SITEURL', 'http://localhost/site1');
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - wordpress1_data:/var/www/html
    networks:
      - wp1_net
      - public

  db1:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: wp1
      MARIADB_USER: wp1
      MARIADB_PASSWORD: wp1pass
      MARIADB_ROOT_PASSWORD: rootpass1
    volumes:
      - db1_data:/var/lib/mysql
    networks:
      - wp1_net

  wordpress2:
    image: wordpress:php8.2-apache
    depends_on:
      - db2
    environment:
      WORDPRESS_DB_HOST: db2:3306
      WORDPRESS_DB_USER: wp2
      WORDPRESS_DB_PASSWORD: wp2pass
      WORDPRESS_DB_NAME: wp2
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost/site2');
        define('WP_SITEURL', 'http://localhost/site2');
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - wordpress2_data:/var/www/html
    networks:
      - wp2_net
      - public

  db2:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: wp2
      MARIADB_USER: wp2
      MARIADB_PASSWORD: wp2pass
      MARIADB_ROOT_PASSWORD: rootpass2
    volumes:
      - db2_data:/var/lib/mysql
    networks:
      - wp2_net

volumes:
  wordpress1_data:
  wordpress2_data:
  db1_data:
  db2_data:

networks:
  wp1_net:
  wp2_net:
  public:
